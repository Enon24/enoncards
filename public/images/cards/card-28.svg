<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 192" width="400" height="192">
  <defs>
    <linearGradient id="bg28" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b0a0a"/>
      <stop offset="100%" style="stop-color:#1a0505"/>
    </linearGradient>
    <linearGradient id="shine28" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.03)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="192" fill="url(#bg28)"/>
  <rect width="400" height="192" fill="url(#shine28)"/>
  <!-- Sport accent bar top -->
  <rect width="400" height="4" fill="#EF4444"/>
  <!-- Large sport icon (faint background) -->
  <text x="310" y="158" font-size="110" opacity="0.07" text-anchor="middle">⚾</text>
  <!-- Rarity badge -->
  <rect x="12" y="14" width="78" height="22" rx="11" fill="#F59E0B"/>
  <text x="51" y="29" font-size="9.5" fill="white" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif">LEGENDARY</text>
  <!-- Player first name -->
  <text x="20" y="106" font-size="27" fill="white" font-weight="900" font-family="Arial, sans-serif">Mickey</text>
  <!-- Player last name -->
  <text x="20" y="136" font-size="27" fill="white" font-weight="900" font-family="Arial, sans-serif">Mantle</text>
  <!-- Team & year -->
  <text x="20" y="158" font-size="11.5" fill="#94A3B8" font-family="Arial, sans-serif">NY Yankees · 1952</text>
  <!-- Brand & condition -->
  <text x="20" y="176" font-size="10.5" fill="#EF4444" font-family="Arial, sans-serif" font-weight="bold">Topps · PSA 6</text>
  <!-- Price box right -->
  <rect x="292" y="100" width="96" height="52" rx="8" fill="rgba(37,99,235,0.25)" stroke="#EF4444" stroke-width="1"/>
  <text x="340" y="120" font-size="9.5" fill="#94A3B8" text-anchor="middle" font-family="Arial, sans-serif">WERT</text>
  <text x="340" y="143" font-size="18" fill="#EF4444" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif">$85K</text>
  <!-- Glare effect -->
  <ellipse cx="355" cy="32" rx="55" ry="35" fill="rgba(255,255,255,0.04)"/>
  <!-- Bottom accent bar -->
  <rect y="188" width="400" height="4" fill="#EF4444" opacity="0.6"/>
</svg>