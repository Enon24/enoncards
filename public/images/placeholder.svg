<svg xmlns="http://www.w3.org/2000/svg" width="300" height="420" viewBox="0 0 300 420">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1F3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a6e;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#2563EB;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#1e3a6e;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  <!-- Card background -->
  <rect width="300" height="420" rx="12" fill="url(#cardBg)" />
  <!-- Border -->
  <rect width="298" height="418" x="1" y="1" rx="11" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.6" />
  <!-- Inner shimmer -->
  <rect width="280" height="400" x="10" y="10" rx="8" fill="url(#shimmer)" />
  <!-- Star icon top -->
  <text x="150" y="170" text-anchor="middle" font-size="64" fill="#2563EB" opacity="0.5">★</text>
  <!-- ENON CARDS text -->
  <text x="150" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3B82F6" letter-spacing="4">ENON</text>
  <text x="150" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3B82F6" letter-spacing="6">CARDS</text>
  <!-- Bottom line -->
  <line x1="60" y1="280" x2="240" y2="280" stroke="#1e3a6e" stroke-width="1" />
  <text x="150" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Sports Card</text>
</svg>
